<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEXUS | Command Center</title>
    <style>
        /* High-tech, dark, and glowing UI */
        body { margin: 0; background: #05070a; color: #00d4ff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        #header { padding: 20px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        #nexusFrame { flex-grow: 1; border: none; width: 100%; background: #0a0e14; }
        
        .voice-btn { background: #00d4ff; color: #000; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; border: none; }
        .status-glow { width: 10px; height: 10px; border-radius: 50%; background: #00ff66; box-shadow: 0 0 10px #00ff66; display: inline-block; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="header">
        <div><span class="status-glow"></span>NEXUS COMMAND CENTER</div>
        <button class="voice-btn" onclick="startVoice()">ACTIVATE VOICE</button>
    </div>

    <!-- The Brain (AI Command Center) -->
    <iframe id="nexusFrame" src="ai_commandcenter.html"></iframe>

    <script>
        // Web Speech API for voice control
        function startVoice() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-US';
            recognition.start();

            recognition.onresult = (event) => {
                const command = event.results[0][0].transcript;
                console.log("Voice Command:", command);
                
                // Send voice command to the iframe (The Brain)
                const iframe = document.getElementById('nexusFrame');
                iframe.contentWindow.postMessage(command, '*');
            };
        }
    </script>
</body>
</html>
