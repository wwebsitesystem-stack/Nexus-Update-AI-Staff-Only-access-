<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; background: #0a0e14; display: flex; height: 100vh; }
        nav { width: 200px; border-right: 1px solid #1e293b; padding: 20px; color: white; }
        #nexusFrame { flex-grow: 1; border: none; }
    </style>
</head>
<body>
    <nav>
        <h2>NEXUS</h2>
        <input type="text" id="mainInput" placeholder="Command...">
        <button onclick="sendCommand()">EXECUTE</button>
    </nav>
    
    <iframe id="nexusFrame" src="ai_commandcenter.html"></iframe>

    <script>
        function sendCommand() {
            const cmd = document.getElementById('mainInput').value;
            const iframe = document.getElementById('nexusFrame');
            // Send the message to the iframe
            iframe.contentWindow.postMessage(cmd, '*');
        }
    </script>
</body>
</html>
